<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hola Mundo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap" rel="stylesheet" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        /* Fondo con partículas animadas */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.15), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.10), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(255,255,255,0.12), transparent),
                radial-gradient(2px 2px at 80% 80%, rgba(255,255,255,0.08), transparent),
                radial-gradient(1px 1px at 10% 90%, rgba(255,255,255,0.20), transparent),
                radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.15), transparent),
                radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.05), transparent);
            animation: twinkle 8s ease-in-out infinite alternate;
            pointer-events: none;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Contenedor principal */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        
        /* Texto "Hola Mundo" con gradiente animado */
        .title {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, #8888ff 40%, #ff66aa 70%, #ffffff 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 6s ease-in-out infinite;
            margin-bottom: 2rem;
            line-height: 1.1;
            text-shadow: 0 0 80px rgba(136, 136, 255, 0.15);
        }
        
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Línea decorativa */
        .line {
            width: 80px;
            height: 3px;
            margin: 0 auto 2rem auto;
            background: linear-gradient(90deg, #8888ff, #ff66aa);
            border-radius: 10px;
            animation: pulseWidth 3s ease-in-out infinite;
        }
        
        @keyframes pulseWidth {
            0%, 100% { width: 80px; opacity: 0.6; }
            50% { width: 140px; opacity: 1; }
        }
        
        /* Botones interactivos */
        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        
        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #8888ff, #6666dd);
            color: white;
            box-shadow: 0 4px 20px rgba(136, 136, 255, 0.25);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 8px 40px rgba(136, 136, 255, 0.40);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(10px);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.20);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        /* Efecto de onda en botón */
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }
        
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }
        
        /* Contador pequeño */
        .counter {
            margin-top: 2.5rem;
            color: rgba(255, 255, 255, 0.20);
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }
        
        .counter:hover {
            color: rgba(255, 255, 255, 0.50);
        }
        
        .counter span {
            display: inline-block;
            min-width: 1.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.40);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SOLO "Hola Mundo" como texto principal -->
        <h1 class="title">Hola Mundo</h1>
        
        <!-- Línea decorativa -->
        <div class="line"></div>
        
        <!-- Botones interactivos -->
        <div class="buttons">
            <button class="btn btn-primary" id="btnSaludar">✨ Saludar</button>
            <button class="btn btn-secondary" id="btnColor">🎨 Color</button>
        </div>
        
        <!-- Contador de interacciones -->
        <div class="counter">
            interacciones · <span id="count">0</span>
        </div>
    </div>
    
    <script>
        // === INTERACCIONES ===
        
        const title = document.querySelector('.title');
        const btnSaludar = document.getElementById('btnSaludar');
        const btnColor = document.getElementById('btnColor');
        const countDisplay = document.getElementById('count');
        
        let counter = 0;
        
        // Función para actualizar contador
        function incrementCounter() {
            counter++;
            countDisplay.textContent = counter;
        }
        
        // Efecto de onda en botones
        function createRipple(e) {
            const btn = e.currentTarget;
            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }
        
        // Botón "Saludar" - animación en el texto
        btnSaludar.addEventListener('click', function(e) {
            createRipple(e);
            incrementCounter();
            
            // Animación de salto en el título
            title.style.transition = 'transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1)';
            title.style.transform = 'scale(1.12)';
            setTimeout(() => {
                title.style.transform = 'scale(1)';
            }, 200);
            
            // Mensaje temporal en el botón
            const originalText = this.textContent;
            this.textContent = '👋 ¡Hola!';
            setTimeout(() => {
                this.textContent = originalText;
            }, 800);
        });
        
        // Botón "Color" - cambia el gradiente del texto
        btnColor.addEventListener('click', function(e) {
            createRipple(e);
            incrementCounter();
            
            const colors = [
                'linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff)',
                'linear-gradient(135deg, #ff66aa, #ffcc00, #66ffcc, #8888ff)',
                'linear-gradient(135deg, #a8e6cf, #dcedc1, #ffd3b6, #ffaaa5)',
                'linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb)',
                'linear-gradient(135deg, #ffffff, #8888ff, #ff66aa, #ffffff)'
            ];
            
            const current = Math.floor(Math.random() * colors.length);
            title.style.background = colors[current];
            title.style.backgroundSize = '300% 300%';
            title.style.webkitBackgroundClip = 'text';
            title.style.webkitTextFillColor = 'transparent';
            title.style.backgroundClip = 'text';
            
            // Feedback en el botón
            const originalText = this.textContent;
            this.textContent = '🌈 ¡Listo!';
            setTimeout(() => {
                this.textContent = originalText;
            }, 700);
        });
        
        // Efecto de brillo al pasar mouse sobre el título
        title.addEventListener('mouseenter', function() {
            this.style.transition = 'transform 0.3s ease';
            this.style.transform = 'scale(1.02)';
        });
        
        title.addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1)';
        });
    </script>
</body>
</html>
